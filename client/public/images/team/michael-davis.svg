<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#163a5f"/>
    </linearGradient>
    <clipPath id="circle"><circle cx="200" cy="200" r="200"/></clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="400" height="400" fill="url(#bg)"/>
    <!-- Head -->
    <circle cx="200" cy="145" r="72" fill="#c4a47a"/>
    <!-- Shoulders/Body -->
    <ellipse cx="200" cy="370" rx="120" ry="100" fill="#0d2d4a"/>
    <!-- Shirt collar -->
    <polygon points="200,240 160,280 240,280" fill="#f5f0eb"/>
    <!-- Tie -->
    <polygon points="195,260 205,260 202,310 198,310" fill="#C9A227"/>
    <!-- Suit lapel left -->
    <polygon points="160,280 120,370 200,370 195,260" fill="#0d2d4a"/>
    <!-- Suit lapel right -->
    <polygon points="240,280 280,370 200,370 205,260" fill="#0d2d4a"/>
    <!-- Hair -->
    <ellipse cx="200" cy="110" rx="68" ry="42" fill="#3a2a1a"/>
    <!-- Ear left -->
    <ellipse cx="130" cy="150" rx="10" ry="16" fill="#b8956d"/>
    <!-- Ear right -->
    <ellipse cx="270" cy="150" rx="10" ry="16" fill="#b8956d"/>
  </g>
</svg>
